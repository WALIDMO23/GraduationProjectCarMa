version: '3.8'

services:
  backend_api:
    build:
      context: ./backend_api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - GEMINI_API_KEY=${GEMINI_API_KEY}  # Set this in ~/.env or export GEMINI_API_KEY=your_key on the server

  web_frontend:
    build:
      context: ./web_frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: always
    environment:
      - VITE_API_BASE_URL=http://107.21.214.224:8080/
    depends_on:
      - backend_api
